name: Docker Publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: prep
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_NAME: ${{ vars.DOCKERHUB_IMAGE_NAME }}
        run: |
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="smartmonitorapi"
          fi

          if [ -n "$DOCKERHUB_USERNAME" ]; then
            echo "image=$DOCKERHUB_USERNAME/$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "image=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/djangosmartmonitor:latest

            docker stop django_app || true
            docker rm django_app || true

            docker run -d \
              --name django_app \
              --restart unless-stopped \
              --env-file /home/senseflow/python-api/source/.env \
              -v /home/senseflow/python-api/source/.env:/app/.env \
              -v /home/senseflow/python-api/source/staticfiles:/app/staticfiles \
              -v django_media:/app/media \
              -p 127.0.0.1:8000:8000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/djangosmartmonitor:latest

            docker image prune -f
